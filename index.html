<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 LDR Date Night 💘</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF6B9D;
  --hotpink: #FF3D7F;
  --purple: #A855F7;
  --lavender: #E9D5FF;
  --yellow: #FCD34D;
  --cream: #FFF9F0;
  --dark: #1E1035;
  --card: #ffffff;
  --soft: #7C6B9E;
  --green: #22C55E;
  --red: #EF4444;
  --border: rgba(168,85,247,0.2);
  --shadow: 0 4px 24px rgba(168,85,247,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,107,157,0.08) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(168,85,247,0.08) 0%, transparent 50%);
  color: var(--dark);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  padding: 1.5rem 1rem 5rem;
}

.container { max-width: 600px; margin: 0 auto; }

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 2rem;
  position: relative;
}

.hearts-top { font-size: 1.5rem; margin-bottom: 0.5rem; animation: float 3s ease-in-out infinite; display: block; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

header h1 {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  background: linear-gradient(135deg, var(--hotpink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
  margin-bottom: 0.4rem;
}

header .subtitle {
  font-size: 13px;
  color: var(--soft);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.made-with-love {
  font-size: 11px;
  color: var(--pink);
  font-weight: 700;
  margin-top: 4px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── NAMES & SCORES ── */
.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.name-field {
  background: white;
  border: 2px solid var(--lavender);
  border-radius: 16px;
  padding: 0.75rem 1rem;
  transition: border-color 0.2s;
}

.name-field:focus-within { border-color: var(--pink); }

.name-field label {
  display: block;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 3px;
}

.name-field input {
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--dark);
  width: 100%;
  outline: none;
}

.name-field input::placeholder { color: #DDD; }

.scores-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 1.5rem;
}

.score-box {
  background: white;
  border: 2px solid var(--lavender);
  border-radius: 16px;
  padding: 1rem;
  text-align: center;
  transition: border-color 0.3s, transform 0.2s;
}

.score-box.winner-glow {
  border-color: var(--yellow);
  box-shadow: 0 0 0 3px rgba(252,211,77,0.3);
}

.score-box .sname {
  font-size: 11px;
  font-weight: 800;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.score-box .snum {
  font-family: 'Pacifico', cursive;
  font-size: 2.2rem;
  color: var(--purple);
  line-height: 1;
}

.vs-badge {
  font-family: 'Pacifico', cursive;
  font-size: 1rem;
  color: var(--pink);
  text-align: center;
}

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 1.5rem; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  color: var(--soft);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.progress-bar {
  height: 8px;
  background: var(--lavender);
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--purple));
  border-radius: 100px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* ── CARD ── */
.card {
  background: white;
  border: 2px solid var(--lavender);
  border-radius: 20px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.92) translateY(16px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: 100px;
  margin-bottom: 0.75rem;
}

.pill-warm   { background: #FFE4E8; color: #BE185D; }
.pill-deep   { background: #EDE9FE; color: #6D28D9; }
.pill-us     { background: #D1FAE5; color: #065F46; }
.pill-flirty { background: #FCE7F3; color: #9D174D; }
.pill-future { background: #DBEAFE; color: #1E40AF; }
.pill-round  { background: #FEF3C7; color: #92400E; }

.round-num {
  font-size: 11px;
  font-weight: 800;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.round-title {
  font-size: 1.2rem;
  font-weight: 900;
  color: var(--dark);
  margin-bottom: 1rem;
  line-height: 1.3;
}

.divider {
  border: none;
  border-top: 2px dashed var(--lavender);
  margin: 1rem 0;
}

/* ── GIF ── */
.gif-wrap {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 1rem;
  max-height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--lavender);
}

.gif-wrap img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 14px;
}

/* ── QUESTION CHOICE ── */
.choose-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.75rem;
}

.q-choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }

.q-choice {
  background: var(--cream);
  border: 2px solid var(--lavender);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  text-align: left;
  line-height: 1.5;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  font-family: 'Nunito', sans-serif;
}

.q-choice:hover {
  border-color: var(--pink);
  background: #FFF0F5;
  transform: translateX(4px);
}

.q-choice.selected {
  border-color: var(--purple);
  background: var(--lavender);
}

/* ── SELECTED QUESTION ── */
.question-display {
  background: linear-gradient(135deg, #FFF0F5, #F3E8FF);
  border: 2px solid var(--pink);
  border-radius: 14px;
  padding: 1.25rem;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.6;
  color: var(--dark);
  margin-bottom: 1rem;
}

/* ── FORFEIT ── */
.forfeit {
  background: #FFF7ED;
  border: 2px solid #FDE68A;
  border-radius: 14px;
  padding: 0.875rem 1rem;
  margin-bottom: 1rem;
}

.forfeit .flabel {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #D97706;
  margin-bottom: 4px;
}

.forfeit p {
  font-size: 13px;
  font-weight: 600;
  color: #92400E;
  line-height: 1.6;
}

/* ── BUTTONS ── */
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }

button {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  padding: 10px 20px;
  border-radius: 100px;
  border: 2px solid var(--lavender);
  background: white;
  color: var(--dark);
  cursor: pointer;
  transition: all 0.15s;
}

button:hover { background: var(--lavender); transform: translateY(-2px); }
button:active { transform: scale(0.97) translateY(0); }

.btn-pink {
  background: linear-gradient(135deg, var(--hotpink), var(--purple));
  color: white;
  border: none;
}

.btn-pink:hover { opacity: 0.9; background: linear-gradient(135deg, var(--hotpink), var(--purple)); }

.btn-green { background: var(--green); color: white; border-color: var(--green); }
.btn-green:hover { opacity: 0.9; background: var(--green); }

.btn-red { background: var(--red); color: white; border-color: var(--red); }
.btn-red:hover { opacity: 0.9; background: var(--red); }

/* ── WHO WON ── */
.who-won-label {
  font-size: 13px;
  font-weight: 800;
  color: var(--soft);
  text-align: center;
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.who-won-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: center;
  margin-bottom: 1rem;
}

.won-btn {
  text-align: center;
  padding: 0.75rem;
  border-radius: 14px;
  border: 2px solid var(--lavender);
  background: white;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Nunito', sans-serif;
}

.won-btn:hover { transform: scale(1.04); }

.won-btn .wb-name {
  font-size: 13px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 2px;
}

.won-btn .wb-sub {
  font-size: 10px;
  font-weight: 600;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.won-btn.selected-green { border-color: var(--green); background: #F0FDF4; }
.won-btn.selected-red   { border-color: var(--red);   background: #FEF2F2; }

.or-text {
  font-family: 'Pacifico', cursive;
  font-size: 0.9rem;
  color: var(--pink);
  text-align: center;
}

/* ── END SCREEN ── */
.end-wrap { text-align: center; }

.confetti-emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; animation: bounce 0.6s ease infinite alternate; }

@keyframes bounce {
  from { transform: translateY(0); }
  to   { transform: translateY(-10px); }
}

.end-title {
  font-family: 'Pacifico', cursive;
  font-size: 2rem;
  background: linear-gradient(135deg, var(--hotpink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.end-msg { font-size: 15px; font-weight: 700; color: var(--soft); margin-bottom: 1.5rem; line-height: 1.6; }

.final-scores {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.fs-box {
  background: var(--cream);
  border: 2px solid var(--lavender);
  border-radius: 16px;
  padding: 1rem;
}

.fs-box.winner { border-color: var(--yellow); background: #FFFBEB; }
.fs-name { font-size: 12px; font-weight: 800; color: var(--soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.fs-num { font-family: 'Pacifico', cursive; font-size: 2.5rem; color: var(--purple); }
.fs-crown { font-size: 1.2rem; }

/* ── BLOOPERS ── */
.bloopers { margin-top: 1rem; }

.blooper-title {
  font-family: 'Pacifico', cursive;
  font-size: 1.1rem;
  color: var(--pink);
  margin-bottom: 1rem;
  text-align: center;
}

.blooper-item {
  background: white;
  border: 2px solid var(--lavender);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.blooper-emoji { font-size: 1.5rem; flex-shrink: 0; }

.blooper-text { font-size: 13px; font-weight: 600; color: var(--dark); line-height: 1.6; }
.blooper-text strong { color: var(--hotpink); }

footer {
  text-align: center;
  margin-top: 3rem;
  font-size: 12px;
  font-weight: 700;
  color: var(--pink);
  opacity: 0.8;
  letter-spacing: 0.05em;
}

/* ── WIGGLE ── */
@keyframes wiggle {
  0%,100% { transform: rotate(0deg); }
  25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); }
}

.wiggle { animation: wiggle 0.5s ease; }
</style>
</head>
<body>
<div class="container">

<header>
  <span class="hearts-top">💘✨💘✨💘</span>
  <h1>The Distance Game</h1>
  <div class="subtitle">10 rounds of chaos, love & mild embarrassment</div>
  <div class="made-with-love">made with 💜 by your AI bestie</div>
</header>

<div class="names-row">
  <div class="name-field">
    <label>💁 Your name</label>
    <input id="p1name" type="text" placeholder="Babe 1" oninput="updateNames()" />
  </div>
  <div class="name-field">
    <label>🥰 Their name</label>
    <input id="p2name" type="text" placeholder="Babe 2" oninput="updateNames()" />
  </div>
</div>

<div class="scores-row">
  <div class="score-box" id="sb1">
    <div class="sname" id="s1label">You</div>
    <div class="snum" id="p1score">0</div>
  </div>
  <div class="vs-badge">vs</div>
  <div class="score-box" id="sb2">
    <div class="sname" id="s2label">Them</div>
    <div class="snum" id="p2score">0</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span id="prog-label">Round 0 of 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</div>

<div id="main"></div>

<footer>💘 built with every bit of AI love i've got 💘</footer>
</div>

<script>
// ── DATA ──

const GIFS = {
  warm: [
    "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
    "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif"
  ],
  deep: [
    "https://media.giphy.com/media/l0HlvtIPzPdt2usKs/giphy.gif",
    "https://media.giphy.com/media/xT9IgG50Lg7russbDa/giphy.gif"
  ],
  us: [
    "https://media.giphy.com/media/l4JyX3V0yRmW5EVAI/giphy.gif",
    "https://media.giphy.com/media/3ohzdIuqJoo8QdKlnW/giphy.gif"
  ],
  flirty: [
    "https://media.giphy.com/media/26ufnwz3wDUli7GU0/giphy.gif",
    "https://media.giphy.com/media/l0MYGb1LuZ3n7dRnO/giphy.gif"
  ],
  future: [
    "https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif",
    "https://media.giphy.com/media/3ohs81HMBKMKMBdHhK/giphy.gif"
  ]
};

const ROUNDS = [
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '🌸 Warm Up',
    title: 'Getting comfy',
    gifKey: 'warm',
    pairs: [
      ["What do you do on the nights you miss me most?",
       "What's something you pretend to like but actually can't stand?"],
      ["What's a guilty pleasure you've never told me about?",
       "What's your most irrational fear — be specific."],
    ],
    forfeits: [
      "Talk in an accent chosen by the other person for the ENTIRE next round. No exceptions.",
      "Send a completely unhinged voice note to a mutual friend right now. Content decided by your partner.",
      "Post a photo of your current face, unfiltered, to your story. They screenshot it first.",
    ]
  },
  {
    cat: 'deep', pill: 'pill-deep', pillLabel: '🧠 Deep Cuts',
    title: 'Who even are you',
    gifKey: 'deep',
    pairs: [
      ["What part of your personality did you have to hide growing up?",
       "What's something you believe that most people would disagree with?"],
      ["What's the pettiest thing you've ever done and secretly still proud of?",
       "What's the worst lie you've ever told and completely got away with?"],
    ],
    forfeits: [
      "Eat the weirdest thing in your fridge RIGHT NOW on camera. No warnings.",
      "Do your best impression of the other person. They rate it out of 10. Be brutal.",
      "Let them write your Tinder bio. You read it out loud with full commitment.",
    ]
  },
  {
    cat: 'us', pill: 'pill-us', pillLabel: '💑 Us',
    title: 'About us tho',
    gifKey: 'us',
    pairs: [
      ["When did you first think 'okay I actually really like this person'?",
       "What's something you're scared to need from me?"],
      ["What's something about this that surprised you?",
       "What's our biggest difference and does it worry you at all?"],
    ],
    forfeits: [
      "Let the other person post literally anything on your Instagram story. No vetoes.",
      "Send a voice note confessing something embarrassing about yourself you've never said.",
      "Write a Yelp review of this relationship right now and read it out loud.",
    ]
  },
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '😬 Embarrassing',
    title: 'Please don\'t',
    gifKey: 'warm',
    pairs: [
      ["What's the most embarrassing thing you've ever done to impress someone?",
       "What's a phase you went through that you'd never tell most people?"],
      ["What's something you were absolutely convinced was true as a kid — wrong?",
       "When was the last time you were genuinely wrong about something and had to admit it?"],
    ],
    forfeits: [
      "Call a family member and say 'I have something important to tell you' then describe your breakfast.",
      "Text your most recent ex 'hey how are you' and show the screen. You don't have to send it. Unless...",
      "Read your most cringe text from 3 years ago out loud. No skipping.",
    ]
  },
  {
    cat: 'flirty', pill: 'pill-flirty', pillLabel: '😏 Flirty',
    title: 'Okay getting spicy',
    gifKey: 'flirty',
    pairs: [
      ["What's the most attractive thing I've done without realising it?",
       "What's something you've thought about doing with me but haven't suggested yet?"],
      ["What do you think about when you miss me that way?",
       "What's something you want more of when we're together?"],
    ],
    forfeits: [
      "Describe what you'd do if we were in the same room right now. In detail. Eye contact.",
      "Send a voice note saying something you'd normally only say in person.",
      "Tell me something you've never said out loud about what you want from me.",
    ]
  },
  {
    cat: 'deep', pill: 'pill-deep', pillLabel: '🫀 Vulnerable',
    title: 'The scary stuff',
    gifKey: 'deep',
    pairs: [
      ["What do you need when you're struggling that you find hard to ask for?",
       "What would you want me to know if I ever see you at your worst?"],
      ["What's something you've never quite forgiven yourself for?",
       "What's the bravest thing you've ever done that nobody knows about?"],
    ],
    forfeits: [
      "Cry on command. You have 10 seconds. If you can't — 10 press ups on camera.",
      "Tell me one thing you've been meaning to say but keep putting off. Right now.",
      "Voice note your best friend saying 'I need to tell you something' then describe this game.",

  },
  {
    cat: 'flirty', pill: 'pill-flirty', pillLabel: '🔥 Spicier',
    title: 'No take backs',

    pairs: [
      ["What's a fantasy you've never told anyone?",

      ["What's something you want that you haven't let yourself fully want yet?",

    forfeits: [

      "Describe our next time together in embarrassing detail. Full commitment.",

    ]
  },
  {
    cat: 'us', pill: 'pill-us', pillLabel: '💌 Deep Us',
    title: 'The real ones',
    gifKey: 'us',
    pairs: [

      ["What's your favourite version of me you've witnessed so far?",

    ],
    forfeits: [
      "Write my dating profile as unflattering as possible. Read it out loud.",
      "Say the thing you always almost say but stop yourself from saying.",
      "Describe what you think our first proper morning together will look like. Specific details.",
    ]
  },
  {
    cat: 'warm', pill: 'pill-warm', pillLabel: '🤪 Chaos Round',
    title: 'Pure chaos energy',
    gifKey: 'warm',
    pairs: [
      ["Most likely to start an accidental cult — you or me, and why?",
       "What would I do if I won the lottery tomorrow — describe it in detail."],
      ["What's my most embarrassing habit you've noticed but never mentioned?",
       "If you had to describe me as a type of weather, what would I be and why?"],
    ],
    forfeits: [
      "Do a full minute of stand-up comedy about this relationship. No pausing.",
      "Let them pick any song — you have to dance to it on camera. Full commitment.",
      "Send the least funny meme you can find to a group chat and screenshot reactions.",
    ]
  },
  {
    cat: 'future', pill: 'pill-future', pillLabel: '🌙 Future',
    title: 'When we make it',
    gifKey: 'future',
    pairs: [
      ["What's the first boring everyday thing you want to do together when the distance is gone?",
       "What do you want us to still be doing when we're really old and creaky?"],
      ["What are you building right now that's partly for us?",
       "What does our eventual normal look like in your head — describe a Tuesday."],
    ],
    forfeits: [
      "Plan one specific date for when you're next together. Right now. Out loud. Every detail.",
      "Say the thing you've been saving for in person — say it now, on the call.",
      "Describe what you'd do on the first morning we wake up without a goodbye flight.",
    ]
  }
];

const BLOOPERS = [
  { emoji: "🎭", text: (p1, p2, log) => `<strong>${longestAnswer(log)}</strong> gave the most unhinged answer of the night. You know the one.` },
  { emoji: "💀", text: (p1, p2, log) => `Somebody nearly refused a forfeit. Nearly. We all saw it.` },
  { emoji: "🫠", text: (p1, p2, log) => `The flirty round caused ${Math.random() > 0.5 ? p1 : p2} visible discomfort. Screenshots would have been everything.` },
  { emoji: "😭", text: (p1, p2, log) => `One of you almost cried at Round 6. You know who you are. It's okay. It's beautiful actually.` },
  { emoji: "🏆", text: (p1, p2, log) => `This game was made by an AI that has never been in a relationship and somehow still knows your business.` },
  { emoji: "📱", text: (p1, p2, log) => `At least one forfeit was definitely not completed. We all agreed to let that slide.` },
  { emoji: "🌙", text: (p1, p2, log) => `Despite the chaos, you're both still on the call. That's kind of everything.` },
];

function longestAnswer(log) {
  return log && log.length > 0 ? log[Math.floor(Math.random() * log.length)] : "Someone";
}

// ── STATE ──
let ri = 0;
let p1 = 0, p2 = 0;
let roundWinner = null;
let gameLog = [];
let pairIdx = 0;
let selectedQ = null;
let phase = 'choose'; // 'choose' | 'answer' | 'winner'

function n1() { return document.getElementById('p1name').value.trim() || 'Babe 1'; }
function n2() { return document.getElementById('p2name').value.trim() || 'Babe 2'; }

function updateNames() {
  document.getElementById('s1label').textContent = n1();
  document.getElementById('s2label').textContent = n2();
}

function randomGif(cat) {
  const arr = GIFS[cat] || GIFS.warm;
  return arr[Math.floor(Math.random() * arr.length)];
}

function randomForfeit(r) {
  return r.forfeits[Math.floor(Math.random() * r.forfeits.length)];
}

function updateScores() {
  document.getElementById('p1score').textContent = p1;
  document.getElementById('p2score').textContent = p2;
  document.getElementById('s1label').textContent = n1();
  document.getElementById('s2label').textContent = n2();
  const pct = Math.round((ri / ROUNDS.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Round ${Math.min(ri+1, ROUNDS.length)} of ${ROUNDS.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('sb1').className = 'score-box' + (p1 > p2 ? ' winner-glow' : '');
  document.getElementById('sb2').className = 'score-box' + (p2 > p1 ? ' winner-glow' : '');
}

function render() {
  updateScores();
  const main = document.getElementById('main');

  if (ri >= ROUNDS.length) {
    renderEnd(main);
    return;
  }

  const r = ROUNDS[ri];
  const pair = r.pairs[pairIdx % r.pairs.length];
  const forfeit = randomForfeit(r);
  const gif = randomGif(r.gifKey);

  if (phase === 'choose') {
    main.innerHTML = `
      <div class="card">
        <div class="pill ${r.pill}">${r.pillLabel}</div>
        <div class="round-num">Round ${ri + 1} of ${ROUNDS.length}</div>
        <div class="round-title">${r.title} 👀</div>
        <div class="gif-wrap"><img src="${gif}" alt="meme gif" onerror="this.style.display='none'" /></div>
        <hr class="divider">
        <div class="choose-label">🎯 Pick your question, coward:</div>
        <div class="q-choices">
          <button class="q-choice" id="qc0" onclick="selectQ(0, this)">${pair[0]}</button>
          <button class="q-choice" id="qc1" onclick="selectQ(1, this)">${pair[1]}</button>
        </div>
        <div id="pick-btn-row"></div>
      </div>`;
  } else if (phase === 'answer') {
    const pair = r.pairs[pairIdx % r.pairs.length];
    const q = pair[selectedQ];
    main.innerHTML = `
      <div class="card">
        <div class="pill ${r.pill}">${r.pillLabel}</div>
        <div class="round-num">Round ${ri + 1} of ${ROUNDS.length} — answer time 🫣</div>
        <div class="round-title">${r.title}</div>
        <hr class="divider">
        <div class="question-display">💬 ${q}</div>
        <div class="forfeit">
          <div class="flabel">⚡ Forfeit if you refuse</div>
          <p>${forfeit}</p>
        </div>
        <hr class="divider">
        <div class="who-won-label">👑 Who won this round?</div>
        <div class="who-won-row">
          <button class="won-btn" id="wb1" onclick="selectWinner(1)">
            <div class="wb-name" id="wb1name">${n1()}</div>
            <div class="wb-sub">gave better answer</div>
          </button>
          <div class="or-text">or</div>
          <button class="won-btn" id="wb2" onclick="selectWinner(2)">
            <div class="wb-name" id="wb2name">${n2()}</div>
            <div class="wb-sub">gave better answer</div>
          </button>
        </div>
        <div id="next-row"></div>
      </div>`;
  }
}

function selectQ(idx, el) {
  selectedQ = idx;
  document.querySelectorAll('.q-choice').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('pick-btn-row').innerHTML = `
    <div class="btn-row" style="justify-content:center">
      <button class="btn-pink" onclick="goAnswer()">Ask this one! 🎤</button>
    </div>`;
}

function goAnswer() {
  if (selectedQ === null) return;
  phase = 'answer';
  render();
}

function selectWinner(player) {
  roundWinner = player;
  document.getElementById('wb1').className = 'won-btn' + (player === 1 ? ' selected-green' : ' selected-red');
  document.getElementById('wb2').className = 'won-btn' + (player === 2 ? ' selected-green' : ' selected-red');
  const winName = player === 1 ? n1() : n2();
  gameLog.push(player === 1 ? n1() : n2());
  document.getElementById('next-row').innerHTML = `
    <div style="text-align:center;margin-top:0.5rem">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:0.75rem">✨ ${winName} wins this round!</div>
      <button class="btn-pink" onclick="confirmWinner()">Next round →</button>
    </div>`;
}

function confirmWinner() {
  if (roundWinner === 1) p1++;
  else p2++;
  roundWinner = null;
  selectedQ = null;
  pairIdx++;
  ri++;
  phase = 'choose';
  render();
}

function renderEnd(main) {
  const winner = p1 > p2 ? n1() : p2 > p1 ? n2() : null;
  const tie = !winner;
  const winMsg = tie
    ? "It's a tie 🤝 You both win. You both also both lost. That's love."
    : `${winner} wins! 🎉 The other one owes a forfeit of the winner's choosing. Choose wisely. Choose chaos.`;

  const bloopers = BLOOPERS.map(b => `
    <div class="blooper-item">
      <span class="blooper-emoji">${b.emoji}</span>
      <div class="blooper-text">${b.text(n1(), n2(), gameLog)}</div>
    </div>`).join('');

  main.innerHTML = `
    <div class="card">
      <div class="end-wrap">
        <span class="confetti-emoji">🎉</span>
        <div class="end-title">Game Over!</div>
        <div class="end-msg">${winMsg}</div>
        <div class="final-scores">
          <div class="fs-box ${p1 >= p2 && !tie ? 'winner' : ''}">
            <div class="fs-name">${n1()} ${p1 > p2 ? '👑' : ''}</div>
            <div class="fs-num">${p1}</div>
          </div>
          <div class="fs-box ${p2 >= p1 && !tie ? 'winner' : ''}">
            <div class="fs-name">${n2()} ${p2 > p1 ? '👑' : ''}</div>
            <div class="fs-num">${p2}</div>
          </div>
        </div>
        <button class="btn-pink" onclick="resetGame()">Play again 💘</button>
      </div>
    </div>
    <div class="card bloopers">
      <div class="blooper-title">🎬 Tonight's bloopers</div>
      ${bloopers}
    </div>`;

  document.getElementById('prog').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Done! 🎉';
  document.getElementById('prog-pct').textContent = '100%';
}

function resetGame() {
  ri = 0; p1 = 0; p2 = 0;
  roundWinner = null; selectedQ = null;
  phase = 'choose'; pairIdx = 0;
  gameLog = [];
  render();
}

// ── INIT ──
render();
</script>
</body>
</html>
