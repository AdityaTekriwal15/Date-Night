<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e5989b;
  --deep-rose: #b56576;
  --gold: #dfb48c;
  --cream: #fffaf5;
  --dark: #352f36;
  --glass: rgba(255, 255, 255, 0.7);
  --shadow: 0 10px 30px rgba(181, 101, 118, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  background-image: 
    radial-gradient(at 0% 0%, rgba(229, 152, 155, 0.12) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(223, 180, 140, 0.12) 0px, transparent 50%);
  color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 1rem;
}

/* ── MINIMALIST SOUND BUTTON ── */
#sound-toggle {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: none;
  border: none;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--deep-rose);
  cursor: pointer;
  text-transform: uppercase;
  opacity: 0.5;
  transition: opacity 0.3s;
  z-index: 1000;
}

#sound-toggle:hover { opacity: 1; }

.container { max-width: 550px; margin: auto; width: 100%; position: relative; }

header {
  text-align: center;
  margin-bottom: 3rem;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 8vw, 2.8rem);
  color: var(--deep-rose);
  font-weight: 700;
  margin-bottom: 0.4rem;
}

header .subtitle {
  font-size: 0.85rem;
  color: var(--rose);
  font-weight: 500;
  letter-spacing: 0.05em;
}

.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}

.name-input-wrap {
  background: var(--glass);
  border: 1px solid rgba(229, 152, 155, 0.2);
  border-radius: 12px;
  padding: 0.6rem 1rem;
}

.name-input-wrap label {
  display: block;
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--deep-rose);
  text-transform: uppercase;
  margin-bottom: 2px;
}

.name-input-wrap input {
  border: none;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--dark);
  width: 100%;
  outline: none;
}

.progress-bar {
  height: 2px;
  background: rgba(229, 152, 155, 0.15);
  margin-bottom: 2.5rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--deep-rose);
  width: 0%;
  transition: width 0.6s ease;
}

.card {
  background: white;
  border-radius: 30px;
  padding: 3rem 2rem;
  box-shadow: var(--shadow);
  text-align: center;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.round-info {
  font-size: 0.7rem;
  color: var(--rose);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: var(--dark);
  margin-bottom: 2.5rem;
  line-height: 1.3;
}

.btn-group { display: flex; flex-direction: column; gap: 10px; }

button.game-btn {
  font-family: 'Montserrat', sans-serif;
  padding: 1.1rem;
  border-radius: 15px;
  border: 1px solid rgba(229, 152, 155, 0.2);
  background: white;
  color: var(--dark);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}

button.game-btn:hover {
  border-color: var(--rose);
  background: var(--cream);
}

button.primary { background: var(--deep-rose); color: white; border: none; margin-top: 1.5rem; font-weight: 600; }
button.primary:disabled { opacity: 0.3; }
button.selected { border-color: var(--deep-rose); background: rgba(181, 101, 118, 0.05); font-weight: 600; }

.question-box {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  color: var(--deep-rose);
  line-height: 1.5;
  margin-bottom: 2rem;
}

.instruction { font-size: 0.8rem; color: var(--rose); font-style: italic; margin-top: 1rem; }

footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--deep-rose);
  letter-spacing: 0.15em;
  padding-bottom: 2rem;
}
</style>
</head>
<body>

<button id="sound-toggle" onclick="toggleAudio()">Sound: Off</button>

<div class="container">
  <header>
    <h1>The Distance Game</h1>
    <div class="subtitle">Closing the gap, one question at a time.</div>
  </header>

  <div class="names-row">
    <div class="name-input-wrap">
      <label>Player One</label>
      <input id="p1" type="text" placeholder="Babe" oninput="saveNames()">
    </div>
    <div class="name-input-wrap">
      <label>Player Two</label>
      <input id="p2" type="text" placeholder="Lindsie" oninput="saveNames()">
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div id="game-ui"></div>

  <footer>FOR LINDSIE WITH ALL MY LOVE</footer>
</div>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>

<script>
// ── QUESTION DATA ──
const POOL = [
  "If your friends had to describe your worst quality, what would they say?",
  "What's something you're secretly really proud of but would never brag about?",
  "What's the pettiest thing you've ever done?",
  "When was the last time you had to admit you were genuinely wrong?",
  "What is your most controversial food opinion?",
  "What's something you want to do but are too scared to admit?",
  "What would you do differently if nobody was watching?",
  "What are you most afraid people would find out about you?",
  "What's a dream you've quietly given up on?",
  "What did you first notice about me that you'd never say unprompted?",
  "What do I do that you find secretly endearing but never mention?",
  "When did you first think 'okay, I actually really like this person'?",
  "What's something you wish you could ask me but haven't?",
  "What do you do when you're alone that you'd never do in front of anyone?",
  "What's a guilty pleasure you've never told me about?",
  "What do you think about right before you fall asleep?",
  "What's something that always cheers you up but is embarrassing to admit?",
  "When do you feel most like yourself?",
  "What's something you've thought about doing with me but haven't suggested?",
  "What's the most attractive thing I've done without realizing it?",
  "What do you think about when you miss me in 'that' way?",
  "What's something you want more of when we're together?",
  "What is the first thing you want to do the moment we're in the same room?",
  "Is there somewhere you've been imagining taking me?",
  "What's a normal everyday thing you're most excited to do together in person?",
  "What's something you want to say to me that's easier face-to-face?",
  "What do you want our first morning together to look like?",
  "What's something you've been saving for when we're finally in the same place?",
  "What version of yourself are you still trying to become?",
  "What's something you believe that most people would disagree with?",
  "What do you think is the most misunderstood thing about you?",
  "What's something you've never quite forgiven yourself for?",
  "What part of your personality did you have to hide growing up?",
  "What's something about our relationship that surprised you?",
  "What's something you're scared to need from me?",
  "What do you hope I never change?",
  "What was the hardest part about the distance you never fully told me?",
  "What do you do on the nights you miss me most?",
  "What keeps you going when the distance feels impossible?",
  "What's something you've learned about yourself because of the distance?",
  "What's something about being apart that has unexpectedly made us stronger?",
  "What's something I do that changes you without me realizing it?",
  "What's the first 'boring' domestic thing you want to do when the distance is gone?",
  "What do you want us to still be doing when we're really old and creaky?"
];

// ── STATE ──
let currentRound = 0;
const totalRounds = 10;
let phase = 'pick-asker';
let asker = null;
let currentChoices = [];
let selectedQuestionIdx = null;

const shuffledPool = [...POOL].sort(() => Math.random() - 0.5);

function getName(id) {
  return document.getElementById(id).value.trim() || (id === 'p1' ? 'Babe' : 'Lindsie');
}

function saveNames() { if (phase === 'pick-asker') render(); }

function toggleAudio() {
  const audio = document.getElementById('bg-music');
  const btn = document.getElementById('sound-toggle');
  if (audio.paused) { audio.play(); btn.innerText = "Sound: On"; }
  else { audio.pause(); btn.innerText = "Sound: Off"; }
}

function render() {
  const ui = document.getElementById('game-ui');
  const progress = document.getElementById('progress');
  progress.style.width = `${(currentRound / totalRounds) * 100}%`;

  if (currentRound >= totalRounds) {
    ui.innerHTML = `
      <div class="card">
        <div class="card-title">You're my favorite reality.</div>
        <div class="question-box">Distance is just space. This is what matters. I love you, Lindsie.</div>
        <button class="game-btn primary" onclick="location.reload()">Start New Session</button>
      </div>`;
    return;
  }

  if (phase === 'pick-asker') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1} &bull; Decision</div>
        <div class="card-title">Who is asking this time?</div>
        <div class="btn-group">
          <button class="game-btn" onclick="setAsker(1)">${getName('p1')}</button>
          <button class="game-btn" onclick="setAsker(2)">${getName('p2')}</button>
        </div>
      </div>`;
  } 
  else if (phase === 'pick-question') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1} &bull; Selection</div>
        <div class="card-title">${asker === 1 ? getName('p1') : getName('p2')}, choose your path:</div>
        <div class="btn-group">
          <button class="game-btn ${selectedQuestionIdx === 0 ? 'selected' : ''}" onclick="selectQ(0)">${currentChoices[0]}</button>
          <button class="game-btn ${selectedQuestionIdx === 1 ? 'selected' : ''}" onclick="selectQ(1)">${currentChoices[1]}</button>
        </div>
        <button class="game-btn primary" onclick="confirmQ()" ${selectedQuestionIdx === null ? 'disabled' : ''}>Confirm Question</button>
      </div>`;
  }
  else if (phase === 'answer') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1} &bull; Connection</div>
        <div class="question-box">"${currentChoices[selectedQuestionIdx]}"</div>
        <div class="instruction">
          ${asker === 1 ? getName('p2') : getName('p1')} answers first. <br>
          Then, ${asker === 1 ? getName('p1') : getName('p2')} shares.
        </div>
        <button class="game-btn primary" onclick="nextRound()">Next Round</button>
      </div>`;
  }
}

function setAsker(num) {
  asker = num;
  currentChoices = shuffledPool.slice(currentRound * 2, (currentRound * 2) + 2);
  phase = 'pick-question';
  render();
}

function selectQ(idx) { selectedQuestionIdx = idx; render(); }
function confirmQ() { phase = 'answer'; render(); }
function nextRound() {
  currentRound++;
  phase = 'pick-asker';
  asker = null;
  selectedQuestionIdx = null;
  render();
}

render();
</script>
</body>
</html>
