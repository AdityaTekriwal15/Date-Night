<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e5989b;
  --deep-rose: #b56576;
  --gold: #dfb48c;
  --cream: #fffaf5;
  --dark: #352f36;
  --glass: rgba(255, 255, 255, 0.8);
  --shadow: 0 10px 30px rgba(181, 101, 118, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  background-image: 
    radial-gradient(at 0% 0%, rgba(229, 152, 155, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(223, 180, 140, 0.15) 0px, transparent 50%);
  color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  padding: 2rem 1rem;
  line-height: 1.7;
}

.container { max-width: 600px; margin: 0 auto; position: relative; }

/* ── AMBIENCE PLAYER ── */
.ambience-controls {
  position: absolute;
  top: -10px;
  right: 0;
  display: flex;
  gap: 10px;
  background: var(--glass);
  padding: 8px 15px;
  border-radius: 50px;
  border: 1px solid rgba(229, 152, 155, 0.2);
}

.ambience-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.ambience-btn:hover, .ambience-btn.active { opacity: 1; transform: scale(1.1); }

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 3rem;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 7vw, 3rem);
  color: var(--deep-rose);
  font-weight: 700;
  margin-bottom: 0.5rem;
}

header .subtitle {
  font-size: 0.95rem;
  color: var(--rose);
  font-weight: 500;
}

/* ── PLAYER NAMES ── */
.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 2rem;
}

.name-input-wrap {
  background: var(--glass);
  border: 1px solid rgba(229, 152, 155, 0.3);
  border-radius: 12px;
  padding: 0.8rem 1rem;
}

.name-input-wrap label {
  display: block;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--deep-rose);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.name-input-wrap input {
  border: none;
  background: transparent;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--dark);
  width: 100%;
  outline: none;
}

/* ── PROGRESS ── */
.progress-bar {
  height: 3px;
  background: rgba(229, 152, 155, 0.2);
  border-radius: 10px;
  margin-bottom: 2rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose), var(--deep-rose));
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── GAME CARDS ── */
.card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid white;
  border-radius: 24px;
  padding: 2.5rem 2rem;
  box-shadow: var(--shadow);
  text-align: center;
}

.round-info {
  font-size: 0.75rem;
  color: var(--rose);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 1rem;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: var(--dark);
  margin-bottom: 2rem;
}

/* ── BUTTONS ── */
.btn-group { display: flex; flex-direction: column; gap: 12px; }

button {
  font-family: 'Montserrat', sans-serif;
  padding: 1.2rem;
  border-radius: 15px;
  border: 1px solid rgba(229, 152, 155, 0.3);
  background: white;
  color: var(--dark);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  border-color: var(--rose);
  background: var(--cream);
}

button.primary { background: var(--deep-rose); color: white; border: none; margin-top: 1.5rem; }
button.selected { border-color: var(--deep-rose); background: rgba(181, 101, 118, 0.05); }

/* ── QUESTION DISPLAY ── */
.question-box {
  background: white;
  padding: 2rem;
  border-radius: 20px;
  margin-bottom: 2rem;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  color: var(--deep-rose);
  line-height: 1.6;
}

.instruction { font-size: 0.85rem; color: var(--rose); margin-top: 1rem; }

footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--deep-rose);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="container">
  <div class="ambience-controls">
    <button class="ambience-btn" onclick="toggleAudio('rain')" title="Rainfall">🌧️</button>
    <button class="ambience-btn" onclick="toggleAudio('fire')" title="Fireplace">🔥</button>
    <button class="ambience-btn" onclick="toggleAudio('lofi')" title="Soft Ambient">🌙</button>
  </div>

  <header>
    <h1>The Distance Game</h1>
    <div class="subtitle">Closing the gap, one question at a time.</div>
  </header>

  <div class="names-row">
    <div class="name-input-wrap">
      <label>Player One</label>
      <input id="p1" type="text" placeholder="Babe" oninput="saveNames()">
    </div>
    <div class="name-input-wrap">
      <label>Player Two</label>
      <input id="p2" type="text" placeholder="Love" oninput="saveNames()">
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div id="game-ui"></div>

  <footer>FOR LINDSIE WITH ALL MY LOVE</footer>
</div>

<audio id="audio-rain" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio> <audio id="audio-fire" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
<audio id="audio-lofi" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// ── DATA ──
const ROUNDS = [
  { title: "Looking Back", pairs: ["What is a small moment from our last visit that you keep replaying in your head?", "What shirt or hoodie of mine do you wish you were wearing tonight?"] },
  { title: "The Miles", pairs: ["What is the hardest time of day to be away from me?", "What’s a weird little habit of mine you actually find yourself missing?"] },
  { title: "Chemistry", pairs: ["If I were lying next to you right now, what is the very first thing you’d do?", "Describe exactly how you want me to kiss you the second we see each other next."] },
  { title: "Confessions", pairs: ["What’s something you’ve been wanting to try with me but haven't brought up yet?", "What was the exact moment you realized the physical tension between us was real?"] },
  { title: "The Mind", pairs: ["What is an intellectual trait of mine that turns you on the most?", "What’s a specific thing I do that makes you feel instantly desired?"] },
  { title: "Body Language", pairs: ["What part of my body have you been thinking about the most today?", "What is your favorite way for me to touch you when we're just relaxing?"] },
  { title: "Realities", pairs: ["What’s the most boring, everyday thing you wish we could do together tomorrow?", "How has being apart changed the way you think about us?"] },
  { title: "Intensity", pairs: ["Describe a time I looked at you and you felt it in your whole body.", "What were you genuinely thinking the first time you saw me naked?"] },
  { title: "The Reunion", pairs: ["What are we doing on our first Sunday morning together after the distance is gone?", "If you could freeze one physical memory of us forever, which one would it be?"] },
  { title: "The Horizon", pairs: ["What is a promise you want to make to my body tonight?", "What is the one thing you are most looking forward to building with me?"] }
];

// ── STATE ──
let currentRound = 0;
let phase = 'pick-asker';
let asker = null;
let selectedQuestionIdx = null;

function getName(id) {
  return document.getElementById(id).value.trim() || (id === 'p1' ? 'Player 1' : 'Player 2');
}

function saveNames() { if (phase === 'pick-asker') render(); }

// ── AUDIO LOGIC ──
function toggleAudio(type) {
  const audios = ['audio-rain', 'audio-fire', 'audio-lofi'];
  audios.forEach(id => {
    const el = document.getElementById(id);
    if(id === `audio-${type}`) {
      if(el.paused) { el.play(); document.querySelector(`[title="${type.charAt(0).toUpperCase() + type.slice(1)}"]`).classList.add('active'); }
      else { el.pause(); document.querySelector(`[title="${type.charAt(0).toUpperCase() + type.slice(1)}"]`).classList.remove('active'); }
    } else {
      el.pause();
    }
  });
}

function render() {
  const ui = document.getElementById('game-ui');
  const progress = document.getElementById('progress');
  progress.style.width = `${(currentRound / ROUNDS.length) * 100}%`;

  if (currentRound >= ROUNDS.length) {
    ui.innerHTML = `
      <div class="card">
        <div class="card-title">You're everything.</div>
        <div class="question-box">The distance is only temporary. I love you.</div>
        <button class="primary" onclick="location.reload()">Start Over</button>
      </div>`;
    return;
  }

  const round = ROUNDS[currentRound];

  if (phase === 'pick-asker') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">Round ${currentRound + 1} &bull; ${round.title}</div>
        <div class="card-title">Who is asking?</div>
        <div class="btn-group">
          <button onclick="setAsker(1)">${getName('p1')}</button>
          <button onclick="setAsker(2)">${getName('p2')}</button>
        </div>
      </div>`;
  } 
  else if (phase === 'pick-question') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">${round.title}</div>
        <div class="card-title">${asker === 1 ? getName('p1') : getName('p2')}'s turn</div>
        <div class="btn-group">
          <button class="${selectedQuestionIdx === 0 ? 'selected' : ''}" onclick="selectQ(0)">${round.pairs[0]}</button>
          <button class="${selectedQuestionIdx === 1 ? 'selected' : ''}" onclick="selectQ(1)">${round.pairs[1]}</button>
        </div>
        <button class="primary" onclick="confirmQ()" ${selectedQuestionIdx === null ? 'disabled' : ''}>Ask it</button>
      </div>`;
  }
  else if (phase === 'answer') {
    ui.innerHTML = `
      <div class="card">
        <div class="round-info">${round.title}</div>
        <div class="question-box">"${round.pairs[selectedQuestionIdx]}"</div>
        <div class="instruction">
          ${asker === 1 ? getName('p2') : getName('p1')} answers, then ${asker === 1 ? getName('p1') : getName('p2')}.
        </div>
        <button class="primary" onclick="nextRound()">Next Round</button>
      </div>`;
  }
}

function setAsker(num) { asker = num; phase = 'pick-question'; render(); }
function selectQ(idx) { selectedQuestionIdx = idx; render(); }
function confirmQ() { phase = 'answer'; render(); }
function nextRound() { currentRound++; phase = 'pick-asker'; asker = null; selectedQuestionIdx = null; render(); }

render();
</script>
</body>
</html>
