<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Distance Game</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2C3E50;
  --accent: #8E9EAB;
  --highlight: #D5BFAF;
  --bg: #F9FAFB;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #1F2937;
  --text-light: #6B7280;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 3rem 1rem 5rem;
  line-height: 1.6;
}

.container { max-width: 650px; margin: 0 auto; }

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 3rem;
}

header h1 {
  font-family: 'Lora', serif;
  font-size: clamp(2rem, 5vw, 2.8rem);
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

header .subtitle {
  font-size: 0.95rem;
  color: var(--text-light);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* ── NAMES & SCORES ── */
.names-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.name-field {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1.2rem;
  transition: border-color 0.2s;
}

.name-field:focus-within { border-color: var(--accent); }

.name-field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 4px;
}

.name-field input {
  border: none;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
  width: 100%;
  outline: none;
}

.name-field input::placeholder { color: #D1D5DB; }

.scores-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  margin-bottom: 2.5rem;
}

.score-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  text-align: center;
  transition: all 0.3s ease;
}

.score-box.winner-glow {
  border-color: var(--highlight);
  background: #FCFBF9;
}

.score-box .sname {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.score-box .snum {
  font-family: 'Lora', serif;
  font-size: 2.5rem;
  color: var(--primary);
  line-height: 1;
}

.vs-badge {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--text-light);
  text-align: center;
}

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 2rem; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.5s ease-out;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.round-num {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}

.round-title {
  font-family: 'Lora', serif;
  font-size: 1.5rem;
  color: var(--primary);
  margin-bottom: 1.5rem;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

/* ── QUESTION CHOICE ── */
.choose-label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 1rem;
}

.q-choices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }

.q-choice {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  line-height: 1.6;
  transition: all 0.2s ease;
  font-family: 'Inter', sans-serif;
}

.q-choice:hover {
  border-color: var(--accent);
  background: #FCFBF9;
}

.q-choice.selected {
  border-color: var(--primary);
  background: #F3F4F6;
  font-weight: 500;
}

/* ── SELECTED QUESTION ── */
.question-display {
  background: #FCFBF9;
  border-left: 3px solid var(--highlight);
  padding: 1.5rem;
  font-family: 'Lora', serif;
  font-size: 1.25rem;
  line-height: 1.6;
  color: var(--primary);
  margin-bottom: 1.5rem;
  font-style: italic;
}

/* ── BUTTONS ── */
.btn-row { display: flex; justify-content: center; margin-top: 1.5rem; }

button.action-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 0.85rem 2rem;
  border-radius: 6px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: background 0.2s;
}

button.action-btn:hover { background: #1A252F; }
button.action-btn:disabled { background: var(--border); cursor: not-allowed; }

/* ── WHO WON ── */
.who-won-label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-light);
  text-align: center;
  margin-bottom: 1rem;
}

.who-won-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  margin-bottom: 1.5rem;
}

.won-btn {
  text-align: center;
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.won-btn:hover { border-color: var(--accent); }

.won-btn .wb-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.won-btn .wb-sub {
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--text-light);
}

.won-btn.selected-win { 
  border-color: var(--primary); 
  background: var(--bg); 
}

.or-text {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--text-light);
  text-align: center;
}

/* ── END SCREEN ── */
.end-wrap { text-align: center; padding: 1rem 0; }

.end-title {
  font-family: 'Lora', serif;
  font-size: 2.2rem;
  color: var(--primary);
  margin-bottom: 1rem;
}

.end-msg { 
  font-size: 1rem; 
  color: var(--text-light); 
  margin-bottom: 2rem; 
  line-height: 1.6; 
}

.final-scores {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 2.5rem;
}

.fs-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
}

.fs-box.winner { 
  border-color: var(--highlight); 
  background: #FCFBF9; 
}

.fs-name { 
  font-size: 0.85rem; 
  font-weight: 500; 
  color: var(--text-light); 
  text-transform: uppercase; 
  letter-spacing: 0.05em; 
  margin-bottom: 8px; 
}

.fs-num { 
  font-family: 'Lora', serif; 
  font-size: 3rem; 
  color: var(--primary); 
}

.winner-subtext {
  font-size: 0.9rem;
  color: var(--primary);
  font-weight: 500;
  margin-top: 1.5rem;
}

footer {
  text-align: center;
  margin-top: 4rem;
  font-size: 0.8rem;
  color: var(--text-light);
  letter-spacing: 0.02em;
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>The Distance Game</h1>
  <div class="subtitle">A game of connection and conversation.</div>
</header>

<div class="names-row">
  <div class="name-field">
    <label>Player One</label>
    <input id="p1name" type="text" placeholder="Name" oninput="updateNames()" />
  </div>
  <div class="name-field">
    <label>Player Two</label>
    <input id="p2name" type="text" placeholder="Name" oninput="updateNames()" />
  </div>
</div>

<div class="scores-row">
  <div class="score-box" id="sb1">
    <div class="sname" id="s1label">Player 1</div>
    <div class="snum" id="p1score">0</div>
  </div>
  <div class="vs-badge">vs</div>
  <div class="score-box" id="sb2">
    <div class="sname" id="s2label">Player 2</div>
    <div class="snum" id="p2score">0</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span id="prog-label">Round 1 of 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</div>

<div id="main"></div>

<footer>10 rounds. No distractions.</footer>
</div>

<script>
// ── DATA ──

const ROUNDS = [
  {
    title: 'The Early Days',
    pairs: [
      "What is a small moment from our early days that you still think about?",
      "What is something you initially assumed about me that turned out to be completely wrong?"
    ]
  },
  {
    title: 'Vulnerability',
    pairs: [
      "What is a fear you have about our relationship that you rarely say out loud?",
      "When was a time you felt most supported by me?"
    ]
  },
  {
    title: 'Growth',
    pairs: [
      "How do you think we've changed since we first met?",
      "What is a habit or trait of mine that has positively influenced you?"
    ]
  },
  {
    title: 'Intimacy',
    pairs: [
      "What is something I do that makes you feel incredibly loved, without me even realizing it?",
      "When do you feel most connected to me?"
    ]
  },
  {
    title: 'Reflection',
    pairs: [
      "What is a past disagreement we had that actually made us stronger?",
      "What is something you feel you owe me an apology for, but never quite said?"
    ]
  },
  {
    title: 'The Inner World',
    pairs: [
      "What is something you wish I understood better about your inner world?",
      "What part of yourself do you feel you still hold back from me?"
    ]
  },
  {
    title: 'Appreciation',
    pairs: [
      "What is a quality you admire in me that you wish you had more of?",
      "When was a moment you felt intensely proud of me?"
    ]
  },
  {
    title: 'Desire',
    pairs: [
      "What is a physical boundary or preference we haven't explored but you'd like to?",
      "What is a non-physical trait of mine that you find deeply attractive?"
    ]
  },
  {
    title: 'The Horizon',
    pairs: [
      "What does a perfectly mundane, happy Tuesday look like for us in five years?",
      "What is a shared goal you want us to prioritize over the next year?"
    ]
  },
  {
    title: 'Closing',
    pairs: [
      "What is a promise you want to make to me right now?",
      "If you could freeze one memory of us forever, which would it be?"
    ]
  }
];

// ── STATE ──
let ri = 0;
let p1 = 0, p2 = 0;
let chooser = Math.random() > 0.5 ? 1 : 2; // Randomly assign who picks first
let roundWinner = null;
let selectedQ = null;
let phase = 'choose'; // 'choose' | 'answer'

function n1() { return document.getElementById('p1name').value.trim() || 'Player 1'; }
function n2() { return document.getElementById('p2name').value.trim() || 'Player 2'; }
function getChooserName() { return chooser === 1 ? n1() : n2(); }
function getOtherName() { return chooser === 1 ? n2() : n1(); }

function updateNames() {
  document.getElementById('s1label').textContent = n1();
  document.getElementById('s2label').textContent = n2();
  if(document.getElementById('main').innerHTML !== '') {
      render(); // Re-render to update dynamic text
  }
}

function updateScores() {
  document.getElementById('p1score').textContent = p1;
  document.getElementById('p2score').textContent = p2;
  document.getElementById('s1label').textContent = n1();
  document.getElementById('s2label').textContent = n2();
  
  const pct = Math.round((ri / ROUNDS.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Round ${Math.min(ri+1, ROUNDS.length)} of ${ROUNDS.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  
  document.getElementById('sb1').className = 'score-box' + (p1 > p2 ? ' winner-glow' : '');
  document.getElementById('sb2').className = 'score-box' + (p2 > p1 ? ' winner-glow' : '');
}

function render() {
  updateScores();
  const main = document.getElementById('main');

  if (ri >= ROUNDS.length) {
    renderEnd(main);
    return;
  }

  const r = ROUNDS[ri];

  if (phase === 'choose') {
    main.innerHTML = `
      <div class="card">
        <div class="round-num">Round ${ri + 1} &mdash; ${r.title}</div>
        <div class="round-title">${getChooserName()}'s turn to ask.</div>
        <div class="choose-label">Choose one of the following to ask ${getOtherName()}:</div>
        <div class="q-choices">
          <button class="q-choice ${selectedQ === 0 ? 'selected' : ''}" onclick="selectQ(0)">${r.pairs[0]}</button>
          <button class="q-choice ${selectedQ === 1 ? 'selected' : ''}" onclick="selectQ(1)">${r.pairs[1]}</button>
        </div>
        <div class="btn-row">
          <button class="action-btn" onclick="goAnswer()" ${selectedQ === null ? 'disabled' : ''}>Continue</button>
        </div>
      </div>`;
  } else if (phase === 'answer') {
    const q = r.pairs[selectedQ];
    main.innerHTML = `
      <div class="card">
        <div class="round-num">Round ${ri + 1} &mdash; ${r.title}</div>
        <div class="round-title">Discuss</div>
        <div class="question-display">"${q}"</div>
        <div class="choose-label" style="text-align: center; margin-bottom: 2rem;">
          ${getOtherName()} answers first, followed by ${getChooserName()}.
        </div>
        <hr class="divider">
        <div class="who-won-label">Who gave the more vulnerable or thoughtful response? <br> The winner chooses the next question.</div>
        <div class="who-won-row">
          <button class="won-btn ${roundWinner === 1 ? 'selected-win' : ''}" onclick="selectWinner(1)">
            <div class="wb-name">${n1()}</div>
            <div class="wb-sub">Wins the round</div>
          </button>
          <div class="or-text">or</div>
          <button class="won-btn ${roundWinner === 2 ? 'selected-win' : ''}" onclick="selectWinner(2)">
            <div class="wb-name">${n2()}</div>
            <div class="wb-sub">Wins the round</div>
          </button>
        </div>
        <div class="btn-row">
          <button class="action-btn" onclick="confirmWinner()" ${roundWinner === null ? 'disabled' : ''}>Next Round</button>
        </div>
      </div>`;
  }
}

function selectQ(idx) {
  selectedQ = idx;
  render();
}

function goAnswer() {
  if (selectedQ === null) return;
  phase = 'answer';
  render();
}

function selectWinner(player) {
  roundWinner = player;
  render();
}

function confirmWinner() {
  if (roundWinner === null) return;
  
  if (roundWinner === 1) p1++;
  else p2++;
  
  chooser = roundWinner; // Winner gets to choose the next question
  roundWinner = null;
  selectedQ = null;
  ri++;
  phase = 'choose';
  render();
}

function renderEnd(main) {
  const winner = p1 > p2 ? n1() : p2 > p1 ? n2() : null;
  const tie = !winner;
  const winMsg = tie
    ? "It's a tie. A perfectly balanced end to the game."
    : `${winner} wins the game.`;

  main.innerHTML = `
    <div class="card">
      <div class="end-wrap">
        <div class="end-title">Fin.</div>
        <div class="end-msg">${winMsg}</div>
        <div class="final-scores">
          <div class="fs-box ${p1 >= p2 && !tie ? 'winner' : ''}">
            <div class="fs-name">${n1()}</div>
            <div class="fs-num">${p1}</div>
          </div>
          <div class="fs-box ${p2 >= p1 && !tie ? 'winner' : ''}">
            <div class="fs-name">${n2()}</div>
            <div class="fs-num">${p2}</div>
          </div>
        </div>
        <button class="action-btn" onclick="resetGame()">Play Again</button>
      </div>
    </div>`;

  document.getElementById('prog').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';
  document.getElementById('prog-pct').textContent = '100%';
}

function resetGame() {
  ri = 0; p1 = 0; p2 = 0;
  roundWinner = null; selectedQ = null;
  phase = 'choose';
  chooser = Math.random() > 0.5 ? 1 : 2;
  render();
}

// ── INIT ──
render();
</script>
</body>
</html>
